<!DOCTYPE html>
<html>
<head>
  <title>Chapter Load Test</title>
</head>
<body style="font-family: Arial; padding: 20px; background: #1e1e2e; color: #e0e0e0;">
  <h1>章节加载测试</h1>
  <button onclick="testAllChapters()">测试所有章节</button>
  <button onclick="testChapter3Multiple()">连续测试第三章5次</button>
  <div id="log"></div>
  
  <script>
    const logDiv = document.getElementById('log');
    function log(msg, type = 'info') {
      const p = document.createElement('p');
      p.style.margin = '5px 0';
      p.style.padding = '8px';
      p.style.borderRadius = '4px';
      if (type === 'error') p.style.background = '#ff444444';
      else if (type === 'success') p.style.background = '#44ff4444';
      else p.style.background = '#4444ff44';
      p.textContent = new Date().toLocaleTimeString() + ': ' + msg;
      logDiv.appendChild(p);
    }
    
    async function loadChapterData(chapterId) {
      const url = `/mountain-and-city-echo/data/chapters/${chapterId}.json`;
      log(`尝试加载: ${url}`);
      
      try {
        const start = performance.now();
        const response = await fetch(url);
        const fetchTime = performance.now() - start;
        
        log(`  HTTP 状态: ${response.status} ${response.statusText}`);
        log(`  耗时: ${fetchTime.toFixed(2)}ms`);
        
        if (response.ok) {
          const data = await response.json();
          log(`  ✓ 加载成功: ${data.title}`, 'success');
          log(`    scenes: ${data.scenes.length}`);
          return data;
        } else {
          log(`  ❌ HTTP 错误: ${response.status}`, 'error');
          return null;
        }
      } catch (e) {
        log(`  ❌ 加载异常: ${e.message}`, 'error');
        return null;
      }
    }
    
    async function testAllChapters() {
      logDiv.innerHTML = '';
      log('=== 测试所有章节 ===');
      
      for (let i = 1; i <= 6; i++) {
        const chapterId = `chapter_${String(i).padStart(2, '0')}`;
        log(`\n--- 测试 ${chapterId} ---`);
        await loadChapterData(chapterId);
      }
      
      log('\n=== 测试完成 ===');
    }
    
    async function testChapter3Multiple() {
      logDiv.innerHTML = '';
      log('=== 连续测试第三章5次 ===');
      
      for (let i = 1; i <= 5; i++) {
        log(`\n--- 第${i}次测试 ---`);
        const result = await loadChapterData('chapter_03');
        if (!result) {
          log('❌ 加载失败，停止测试', 'error');
          break;
        }
        await new Promise(resolve => setTimeout(resolve, 1000));
      }
      
      log('\n=== 测试完成 ===');
    }
  </script>
</body>
</html>
