<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山与城的回响 - 自动化测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A2E;
      color: #E8E8E8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      color: #7C6FCD;
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(124, 111, 205, 0.2);
    }
    .section h2 {
      color: #7C6FCD;
      margin-bottom: 15px;
      font-size: 1.2rem;
      border-bottom: 1px solid rgba(124, 111, 205, 0.3);
      padding-bottom: 10px;
    }
    .test-item {
      padding: 10px 15px;
      margin: 8px 0;
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .test-item.passed { border-left: 4px solid #00b894; }
    .test-item.failed { border-left: 4px solid #ff6b6b; }
    .test-item.running { border-left: 4px solid #fdcb6e; }
    .test-icon { font-size: 1.2rem; }
    .test-info { flex: 1; }
    .test-name { font-weight: bold; }
    .test-detail { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .summary-item {
      background: rgba(124, 111, 205, 0.1);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(124, 111, 205, 0.2);
    }
    .summary-value {
      font-size: 2rem;
      font-weight: bold;
      color: #7C6FCD;
    }
    .summary-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7C6FCD 0%, #5a4fb8 100%);
      color: white;
    }
    .btn-primary:hover { transform: scale(1.05); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .btn-danger {
      background: rgba(255,107,107,0.2);
      color: #ff6b6b;
      border: 1px solid rgba(255,107,107,0.3);
    }
    .btn-danger:hover { background: rgba(255,107,107,0.3); }
    .log-container {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .log-entry.error { color: #ff6b6b; }
    .log-entry.warn { color: #fdcb6e; }
    .log-entry.info { color: #81ecec; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .status-pass { background: rgba(0,184,148,0.2); color: #00b894; }
    .status-fail { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .status-running { background: rgba(253,203,110,0.2); color: #fdcb6e; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin: 15px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7C6FCD, #00b894);
      transition: width 0.3s ease;
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
    @media (max-width: 600px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .btn-group { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 山与城的回响 - 自动化测试</h1>

    <div class="section">
      <h2>📊 测试概览</h2>
      <div class="summary">
        <div class="summary-item">
          <div class="summary-value" id="totalTests">0</div>
          <div class="summary-label">总测试</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="passedTests" style="color: #00b894;">0</div>
          <div class="summary-label">通过</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="failedTests" style="color: #ff6b6b;">0</div>
          <div class="summary-label">失败</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="passRate">0%</div>
          <div class="summary-label">通过率</div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>
      <div style="text-align: center;">
        <span class="status-badge" id="testStatus">等待测试</span>
      </div>
    </div>

    <div class="section">
      <h2>🧪 测试项目</h2>
      <div id="testList">
        <div class="test-item running">
          <span class="test-icon">⏳</span>
          <div class="test-info">
            <div class="test-name">等待测试开始...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>📝 操作</h2>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startTest()">🚀 开始测试</button>
        <button class="btn btn-secondary" onclick="exportTestReport()">📄 导出测试报告</button>
        <button class="btn btn-secondary" onclick="exportLogs()">📋 导出日志</button>
        <button class="btn btn-danger" onclick="clearLogs()">🗑️ 清除日志</button>
        <button class="btn btn-secondary" onclick="window.location.href='./'">🎮 进入游戏</button>
      </div>
    </div>

    <div class="section">
      <h2>📜 实时日志</h2>
      <div class="log-container" id="logContainer">
        <div class="log-entry info">等待日志...</div>
      </div>
    </div>

    <div class="footer">
      <p>快捷键: Ctrl+Shift+L 导出日志 | Ctrl+Shift+T 导出测试报告</p>
      <p>测试完成后，点击"进入游戏"验证游戏是否正常运行</p>
    </div>
  </div>

  <script src="./data/logger.js"></script>
  <script>
    // 测试配置
    var tests = [
      { name: '页面加载', check: function() { return { passed: true, detail: '页面成功加载' }; } },
      { name: '日志系统', check: function() { return { passed: !!window.__echoLogger, detail: window.__echoLogger ? '日志系统已初始化' : '日志系统未初始化' }; } },
      { name: 'localStorage', check: function() {
        try {
          localStorage.setItem('test', 'test');
          localStorage.removeItem('test');
          return { passed: true, detail: 'localStorage 可用' };
        } catch(e) {
          return { passed: false, detail: 'localStorage 不可用: ' + e.message };
        }
      }},
      { name: 'fetch API', check: function() {
        return { passed: typeof window.fetch === 'function', detail: 'fetch API ' + (typeof window.fetch === 'function' ? '可用' : '不可用') };
      }},
      { name: 'ES 模块', check: function() {
        var supported = 'noModule' in document.createElement('script');
        return { passed: supported, detail: 'ES 模块 ' + (supported ? '支持' : '不支持') };
      }},
      { name: 'index.html 可访问', check: function() {
        return fetch('./index.html')
          .then(function(r) {
            return { passed: r.ok, detail: 'index.html 状态: ' + r.status };
          })
          .catch(function(e) {
            return { passed: false, detail: '加载失败: ' + e.message };
          });
      }},
      { name: 'JS 文件可访问', check: function() {
        return fetch('./assets/index-CqCLrDAr.js')
          .then(function(r) {
            return { passed: r.ok, detail: 'JS 文件状态: ' + r.status + ', 大小: ' + (r.headers.get('content-length') || '未知') };
          })
          .catch(function(e) {
            return { passed: false, detail: '加载失败: ' + e.message };
          });
      }},
      { name: 'CSS 文件可访问', check: function() {
        return fetch('./assets/index-D7dYIGzJ.css')
          .then(function(r) {
            return { passed: r.ok, detail: 'CSS 文件状态: ' + r.status };
          })
          .catch(function(e) {
            return { passed: false, detail: '加载失败: ' + e.message };
          });
      }},
      { name: '章节数据', check: function() {
        return fetch('./data/chapters/chapter_01.json')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            return { passed: !!data.title, detail: '章节标题: ' + (data.title || '无') };
          })
          .catch(function(e) {
            return { passed: false, detail: '加载失败: ' + e.message };
          });
      }},
      { name: '主页面加载测试', check: function() {
        return new Promise(function(resolve) {
          var iframe = document.createElement('iframe');
          iframe.style.width = '1px';
          iframe.style.height = '1px';
          iframe.style.position = 'absolute';
          iframe.style.left = '-9999px';
          iframe.src = './index.html';
          iframe.onload = function() {
            try {
              var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
              var appElement = iframeDoc.getElementById('app');
              var hasContent = iframeDoc.body.innerText.length > 0;
              var title = iframeDoc.title;
              document.body.removeChild(iframe);
              resolve({
                passed: !!appElement && hasContent,
                detail: '标题: ' + title + ', #app: ' + (!!appElement ? '存在' : '不存在') + ', 内容: ' + (hasContent ? '有' : '无')
              });
            } catch(e) {
              document.body.removeChild(iframe);
              resolve({ passed: false, detail: '跨域或加载错误: ' + e.message });
            }
          };
          iframe.onerror = function() {
            document.body.removeChild(iframe);
            resolve({ passed: false, detail: 'iframe 加载失败' });
          };
          document.body.appendChild(iframe);
          setTimeout(function() {
            if (iframe.parentNode) {
              document.body.removeChild(iframe);
              resolve({ passed: false, detail: '加载超时' });
            }
          }, 10000);
        });
      }}
    ];

    var currentTest = 0;
    var testResults = [];

    function updateUI() {
      var passed = testResults.filter(function(r) { return r.passed; }).length;
      var failed = testResults.filter(function(r) { return !r.passed; }).length;
      var total = testResults.length;
      var rate = total > 0 ? Math.round((passed / total) * 100) : 0;

      document.getElementById('totalTests').textContent = total;
      document.getElementById('passedTests').textContent = passed;
      document.getElementById('failedTests').textContent = failed;
      document.getElementById('passRate').textContent = rate + '%';
      document.getElementById('progressFill').style.width = rate + '%';

      // 更新测试列表
      var html = '';
      testResults.forEach(function(result, index) {
        var icon = result.passed ? '✅' : '❌';
        var className = result.passed ? 'passed' : 'failed';
        html += '<div class="test-item ' + className + '">';
        html += '<span class="test-icon">' + icon + '</span>';
        html += '<div class="test-info">';
        html += '<div class="test-name">' + (index + 1) + '. ' + result.name + '</div>';
        html += '<div class="test-detail">' + result.detail + '</div>';
        html += '</div></div>';
      });

      // 添加当前正在测试的项目
      if (currentTest < tests.length) {
        html += '<div class="test-item running">';
        html += '<span class="test-icon">⏳</span>';
        html += '<div class="test-info">';
        html += '<div class="test-name">' + (currentTest + 1) + '. ' + tests[currentTest].name + '</div>';
        html += '<div class="test-detail">测试中...</div>';
        html += '</div></div>';
      }

      document.getElementById('testList').innerHTML = html;

      // 更新状态
      var status = document.getElementById('testStatus');
      if (currentTest >= tests.length) {
        status.textContent = failed === 0 ? '✅ 全部通过' : '❌ ' + failed + ' 项失败';
        status.className = 'status-badge ' + (failed === 0 ? 'status-pass' : 'status-fail');
      } else {
        status.textContent = '⏳ 测试中 (' + currentTest + '/' + tests.length + ')';
        status.className = 'status-badge status-running';
      }
    }

    function addLogEntry(message, level) {
      var container = document.getElementById('logContainer');
      var entry = document.createElement('div');
      entry.className = 'log-entry ' + (level || 'info');
      entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
    }

    function runNextTest() {
      if (currentTest >= tests.length) {
        addLogEntry('测试完成！通过: ' + testResults.filter(function(r) { return r.passed; }).length + '/' + testResults.length, 'info');
        return;
      }

      var test = tests[currentTest];
      addLogEntry('开始测试: ' + test.name, 'info');

      try {
        var result = test.check();
        if (result instanceof Promise) {
          result.then(function(r) {
            testResults.push({ name: test.name, passed: r.passed, detail: r.detail });
            addLogEntry(test.name + ': ' + (r.passed ? '通过' : '失败') + ' - ' + r.detail, r.passed ? 'info' : 'error');
            currentTest++;
            updateUI();
            setTimeout(runNextTest, 500);
          }).catch(function(e) {
            testResults.push({ name: test.name, passed: false, detail: '异常: ' + e.message });
            addLogEntry(test.name + ': 异常 - ' + e.message, 'error');
            currentTest++;
            updateUI();
            setTimeout(runNextTest, 500);
          });
        } else {
          testResults.push({ name: test.name, passed: result.passed, detail: result.detail });
          addLogEntry(test.name + ': ' + (result.passed ? '通过' : '失败') + ' - ' + result.detail, result.passed ? 'info' : 'error');
          currentTest++;
          updateUI();
          setTimeout(runNextTest, 500);
        }
      } catch(e) {
        testResults.push({ name: test.name, passed: false, detail: '异常: ' + e.message });
        addLogEntry(test.name + ': 异常 - ' + e.message, 'error');
        currentTest++;
        updateUI();
        setTimeout(runNextTest, 500);
      }
    }

    function startTest() {
      currentTest = 0;
      testResults = [];
      updateUI();
      addLogEntry('开始自动化测试...', 'info');
      runNextTest();
    }

    function exportTestReport() {
      if (window.__echoLogger) {
        window.__echoLogger.exportTestReport();
        addLogEntry('测试报告已导出', 'info');
      }
    }

    function exportLogs() {
      if (window.__echoLogger) {
        window.__echoLogger.exportLogs();
        addLogEntry('日志已导出', 'info');
      }
    }

    function clearLogs() {
      if (window.__echoLogger) {
        window.__echoLogger.clearLogs();
        addLogEntry('日志已清除', 'info');
      }
    }

    // 页面加载后自动开始测试
    window.addEventListener('load', function() {
      addLogEntry('页面加载完成，准备开始测试', 'info');
      setTimeout(startTest, 1000);
    });
  </script>
</body>
</html>
