<!DOCTYPE html>
<html>
<head>
  <title>Chapter 3 Load Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e2e; color: #e0e0e0; }
    .result { margin: 10px 0; padding: 10px; background: #2d2d44; border-radius: 8px; }
    .success { border-left: 4px solid #4caf50; }
    .error { border-left: 4px solid #f44336; }
    .info { border-left: 4px solid #2196f3; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #6c63ff; color: white; border: none; border-radius: 4px; }
    button:hover { background: #5a52d5; }
  </style>
</head>
<body>
  <h1>第三章加载测试</h1>
  <button onclick="runTest()">运行测试</button>
  <button onclick="runTest3()">连续测试3次</button>
  <div id="results"></div>

  <script>
    const BASE_PATH = '/mountain-and-city-echo/';
    const resultsDiv = document.getElementById('results');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${msg}`;
      resultsDiv.appendChild(div);
    }

    async function fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        return response;
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    async function testChapter(chapterId) {
      const url = `${BASE_PATH}data/chapters/${chapterId}.json`;
      log(`开始加载 ${chapterId}...`, 'info');
      
      const startTime = performance.now();
      
      try {
        // 测试1: 网络请求
        const fetchStart = performance.now();
        const response = await fetchWithTimeout(url, 15000);
        const fetchTime = performance.now() - fetchStart;
        
        if (!response.ok) {
          log(`❌ HTTP错误: ${response.status} ${response.statusText}`, 'error');
          return false;
        }
        
        log(`✓ 网络请求成功 (${fetchTime.toFixed(2)}ms)`, 'success');
        
        // 测试2: 读取响应
        const readStart = performance.now();
        const text = await response.text();
        const readTime = performance.now() - readStart;
        log(`✓ 响应读取完成 (${readTime.toFixed(2)}ms, ${(text.length / 1024).toFixed(1)}KB)`, 'success');
        
        // 测试3: JSON解析
        const parseStart = performance.now();
        const data = JSON.parse(text);
        const parseTime = performance.now() - parseStart;
        log(`✓ JSON解析成功 (${parseTime.toFixed(2)}ms)`, 'success');
        
        // 测试4: 数据验证
        if (!data.id || !data.title || !data.lines) {
          log(`❌ 数据结构错误: 缺少必要字段`, 'error');
          return false;
        }
        
        log(`✓ 数据验证通过 (ID: ${data.id}, 标题: ${data.title}, ${data.lines.length}行)`, 'success');
        
        const totalTime = performance.now() - startTime;
        log(`✅ ${chapterId} 加载成功! 总耗时: ${totalTime.toFixed(2)}ms`, 'success');
        
        return true;
      } catch (error) {
        const totalTime = performance.now() - startTime;
        log(`❌ ${chapterId} 加载失败: ${error.message} (${totalTime.toFixed(2)}ms)`, 'error');
        return false;
      }
    }

    async function runTest() {
      resultsDiv.innerHTML = '';
      log('=== 开始测试 ===', 'info');
      
      await testChapter('chapter_01');
      await testChapter('chapter_02');
      await testChapter('chapter_03');
      
      log('=== 测试完成 ===', 'info');
    }

    async function runTest3() {
      resultsDiv.innerHTML = '';
      log('=== 连续测试3次 ===', 'info');
      
      for (let i = 1; i <= 3; i++) {
        log(`--- 第${i}次测试 ---`, 'info');
        await testChapter('chapter_03');
        await new Promise(resolve => setTimeout(resolve, 1000));
      }
      
      log('=== 测试完成 ===', 'info');
    }
  </script>
</body>
</html>
